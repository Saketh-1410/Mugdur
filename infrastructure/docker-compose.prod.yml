# Production Docker Compose — runs the full Murgdur stack.
# Usage:
#   docker compose -f infrastructure/docker-compose.prod.yml up -d --build
#
# Required .env file at the project root (or pass via --env-file):
#   DATABASE_URL, REDIS_URL, JWT_SECRET, NEXTAUTH_SECRET, NEXTAUTH_URL,
#   CLOUDFLARE_R2_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#   R2_BUCKET_NAME, R2_PUBLIC_CDN_URL, INTERNAL_API_URL, NEXT_PUBLIC_API_URL
#   SENTRY_DSN (optional), ADMIN_EMAIL (optional)

services:

  # ── Data stores ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: murgdur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-murgdur}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [murgdur]

  redis:
    image: redis:7-alpine
    container_name: murgdur-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [murgdur]

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: murgdur-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [murgdur]

  # ── Database migration (runs once before backend starts) ──────────────────────

  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: murgdur-migrate
    command: ["npx", "prisma", "migrate", "deploy"]
    env_file: ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [murgdur]
    restart: "no"

  # ── Application ───────────────────────────────────────────────────────────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: murgdur-backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL:    redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      NODE_ENV:     production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [murgdur]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: murgdur-frontend
    restart: unless-stopped
    env_file: ../.env
    environment:
      INTERNAL_API_URL: http://backend:3001
      NEXTAUTH_URL:     ${NEXTAUTH_URL}
      NODE_ENV:         production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks: [murgdur]

volumes:
  postgres_data:
  redis_data:
  meili_data:

networks:
  murgdur:
    driver: bridge
